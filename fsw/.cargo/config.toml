[target.thumbv8m.main-none-eabihf]
# Use elf2uf2-rs to convert and flash (requires BOOTSEL mode)
runner = "elf2uf2-rs -d"
# Alternative: picotool (if installed)
# runner = "picotool load -u -v -x -t elf"

[build]
target = "thumbv8m.main-none-eabihf"
# Use a target directory outside OneDrive to avoid sync/permission issues
target-dir = "C:/tmp/fsw-target"

[env]
DEFMT_LOG = "info"
